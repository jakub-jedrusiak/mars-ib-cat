name: Build and deploy Pages on release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: pages-release
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Trust jsCAT package scripts
        run: bun pm trust @bdelab/jscat
        continue-on-error: true

      - name: Build single HTML
        run: bun run build:single

      - name: Prepare Pages files
        run: |
          rm -rf site
          mkdir -p site
          cp dist/mars.html site/mars.html
          cp dist/mars.html site/index.html
          touch site/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true
